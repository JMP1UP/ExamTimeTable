<style>
  :root {
    --ink:#102a43;
    --muted:#627d98;
    --line:#d9e2ec;
    --soft:#f0f4f8;
    --card:#ffffff;
    --accent:#c99a2e;
    --accent-soft:#fff7df;
    --good:#0f766e;
    --danger:#b42318;
    --shadow:0 8px 24px rgba(16,42,67,.09);
    --radius:18px;
  }

  * {
    box-sizing:border-box;
  }

  html,
  body {
    overflow-x:hidden;
  }

  body {
    margin:0;
    font-family:system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--ink);
    background:linear-gradient(180deg,#f7fafc 0%,#edf2f7 100%);
    min-height:100vh;
  }

  header {
    position:sticky;
    top:0;
    z-index:10;
    padding:calc(14px + env(safe-area-inset-top)) 16px 12px;
    background:rgba(247,250,252,.94);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }

  .topbar {
    max-width:980px;
    margin:0 auto;
    display:flex;
    gap:12px;
    align-items:center;
    justify-content:space-between;
  }

  .brand {
    display:flex;
    gap:10px;
    align-items:center;
    min-width:0;
  }

  .badge {
    width:42px;
    height:42px;
    border-radius:14px;
    display:grid;
    place-items:center;
    color:white;
    background:var(--ink);
    font-weight:800;
    letter-spacing:.03em;
    box-shadow:var(--shadow);
    flex:0 0 auto;
  }

  h1 {
    font-size:1.05rem;
    margin:0;
    line-height:1.15;
  }

  .subtitle {
    color:var(--muted);
    font-size:.83rem;
    margin-top:2px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  button,
  .button {
    border:0;
    border-radius:999px;
    padding:10px 14px;
    background:var(--ink);
    color:white;
    font-weight:700;
    cursor:pointer;
    font-size:.9rem;
    min-height:42px;
  }

  button.secondary {
    background:white;
    color:var(--ink);
    border:1px solid var(--line);
  }

  button.warning {
    background:var(--accent-soft);
    color:#6b4e00;
    border:1px solid #f1d488;
  }

  main {
    max-width:980px;
    margin:0 auto;
    padding:16px 16px 72px;
  }

  .panel,
  .card {
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
  }

  .panel {
    padding:14px;
    margin-bottom:14px;
  }

  .controls {
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
    justify-content:space-between;
  }

  .status-row {
    display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:10px;
    margin-top:12px;
  }

  .stat {
    background:var(--soft);
    border-radius:14px;
    padding:12px;
    min-height:74px;
  }

  .stat strong {
    display:block;
    font-size:1.4rem;
    line-height:1;
    margin-bottom:4px;
  }

  .stat span {
    color:var(--muted);
    font-size:.82rem;
  }

  #subjectPanel {
    overflow-y:auto;
    overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
    transition:max-height .25s ease, opacity .2s ease, margin .2s ease;
    max-height:min(72vh, 900px);
    opacity:1;
  }

  #subjectPanel.hidden {
    max-height:0;
    overflow:hidden;
    opacity:0;
    margin:0;
    padding-top:0;
    padding-bottom:0;
    border-width:0;
  }

  .subject-actions {
    position:sticky;
    top:0;
    z-index:2;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin:-2px 0 12px;
    padding:2px 0 10px;
    background:var(--card);
  }

  .subject-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(210px,1fr));
    gap:8px;
  }

  label.subject {
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
    background:var(--soft);
    border:1px solid transparent;
    border-radius:14px;
    font-weight:650;
    cursor:pointer;
  }

  label.subject:has(input:checked) {
    background:var(--accent-soft);
    border-color:#f1d488;
  }

  input[type="checkbox"] {
    width:20px;
    height:20px;
    accent-color:#102a43;
  }

  .notice {
    padding:12px 14px;
    border-radius:14px;
    background:#eefaf8;
    border:1px solid #b7e4df;
    color:#134e4a;
    margin-bottom:12px;
    font-weight:650;
  }

  .notice.empty {
    background:#fff7ed;
    border-color:#fed7aa;
    color:#9a3412;
  }

  .section-title {
    margin:22px 0 10px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:10px;
  }

  .section-title h2 {
    margin:0;
    font-size:1.05rem;
  }

  .section-title span {
    color:var(--muted);
    font-size:.88rem;
  }

  .exam-list {
    display:grid;
    gap:10px;
  }

  .card {
    padding:14px;
    display:grid;
    gap:8px;
    border-left:5px solid var(--accent);
  }

  .card.today {
    border-left-color:var(--good);
    background:linear-gradient(90deg,#effffb 0%,#ffffff 32%);
  }

  .exam-head {
    display:flex;
    justify-content:space-between;
    gap:12px;
    align-items:flex-start;
  }

  .exam-title {
    font-size:1rem;
    font-weight:800;
    margin:0;
  }

  .exam-subject {
    color:var(--muted);
    margin-top:2px;
    font-size:.9rem;
    font-weight:650;
  }

  .pill {
    display:inline-flex;
    align-items:center;
    gap:6px;
    border-radius:999px;
    padding:6px 9px;
    background:var(--soft);
    color:var(--ink);
    font-weight:750;
    font-size:.82rem;
    white-space:nowrap;
  }

  .pill.today-pill {
    background:#ccfbf1;
    color:#115e59;
  }

  .meta {
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    color:var(--muted);
    font-size:.88rem;
  }

  .meta b {
    color:var(--ink);
  }

  .muted {
    color:var(--muted);
  }

  .small {
    font-size:.84rem;
  }

  .hide {
    display:none !important;
  }

  .footer-note {
    margin-top:24px;
    color:var(--muted);
    font-size:.82rem;
    text-align:center;
  }

  @media (max-width:640px) {
    body {
      min-height:100dvh;
    }

    .topbar {
      align-items:flex-start;
    }

    .brand {
      flex:1;
    }

    .status-row {
      grid-template-columns:1fr;
    }

    .exam-head {
      flex-direction:column;
    }

    button {
      padding:9px 12px;
    }

    .subtitle {
      white-space:normal;
    }

    /*
      Important mobile fix:
      On small screens, do not trap the subjects inside their own scrolling box.
      Let the full page scroll instead.
    */
    #subjectPanel {
      max-height:none;
      overflow:visible;
      -webkit-overflow-scrolling:auto;
    }

    #subjectPanel.hidden {
      max-height:0;
      overflow:hidden;
      opacity:0;
      margin:0;
      padding-top:0;
      padding-bottom:0;
      border-width:0;
    }

    .subject-actions {
      position:sticky;
      top:72px;
      z-index:3;
      background:var(--card);
      padding:8px 0 10px;
      margin:0 0 12px;
    }

    .subject-grid {
      grid-template-columns:1fr;
    }
  }

  @media print {
    header,
    #subjectPanel,
    .controls button,
    .footer-note {
      display:none !important;
    }

    body {
      background:white;
    }

    main {
      padding:0;
    }

    .card,
    .panel {
      box-shadow:none;
      break-inside:avoid;
    }
  }
</style>
